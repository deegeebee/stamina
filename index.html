<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#111318" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Tracker</title>
  <link rel="manifest" href="manifest.json" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111318;
      --surface:  #1a1d26;
      --card:     #1e2130;
      --line:     #2a2d3a;
      --stamina:  #22d98a;
      --spirit:   #8b7cf6;
      --damage:   #f05252;
      --text:     #e4e6f0;
      --sub:      #8890aa;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      background: linear-gradient(90deg, var(--stamina), var(--spirit) 55%, var(--damage));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-time {
      font-size: 0.7rem;
      color: var(--sub);
      text-align: right;
      line-height: 1.6;
      letter-spacing: 0.02em;
    }

    /* ── STAT CARDS ── */
    .tracker {
      display: flex;
      gap: 10px;
      padding: 20px 16px;
    }

    .stat-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 16px 8px 14px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 14px 14px 0 0;
    }
    .stamina::before { background: var(--stamina); }
    .spirit::before  { background: var(--spirit); }
    .damage::before  { background: var(--damage); }

    .stat-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }
    .stamina .stat-label { color: var(--stamina); }
    .spirit  .stat-label { color: var(--spirit); }
    .damage  .stat-label { color: var(--damage); }

    /* ── BAR ── */
    .bar-track {
      width: 34px;
      height: 155px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }

    .bar-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0%,
        transparent calc(25% - 1px),
        var(--line) calc(25% - 1px),
        var(--line) 25%
      );
      pointer-events: none;
    }

    .bar-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 7px;
      transition: height 0.3s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    .stamina .bar-fill { background: linear-gradient(to top, #14b872, var(--stamina)); }
    .spirit  .bar-fill { background: linear-gradient(to top, #6b5de0, var(--spirit)); }
    .damage  .bar-fill { background: linear-gradient(to top, #c93f3f, var(--damage)); }

    .stat-value {
      font-size: 1.85rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stamina .stat-value { color: var(--stamina); }
    .spirit  .stat-value { color: var(--spirit); }
    .damage  .stat-value { color: var(--damage); }

    /* ── +/- BUTTONS ── */
    .stat-controls { display: flex; gap: 6px; }

    .btn-adj {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1.5px solid var(--line);
      background: var(--surface);
      color: var(--text);
      font-size: 1.4rem;
      font-weight: 400;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.12s, border-color 0.12s;
      touch-action: manipulation;
      user-select: none;
    }
    .btn-adj:active { transform: scale(0.84); }
    .stamina .btn-adj:active { background: rgba(34,217,138,.15); border-color: var(--stamina); }
    .spirit  .btn-adj:active { background: rgba(139,124,246,.15); border-color: var(--spirit); }
    .damage  .btn-adj:active { background: rgba(240,82,82,.15);   border-color: var(--damage); }

    /* ── SAVE BUTTON ── */
    .save-row {
      padding: 4px 16px 22px;
      display: flex;
      justify-content: center;
    }

    .btn-save {
      width: 100%;
      max-width: 360px;
      padding: 17px;
      border-radius: 13px;
      border: none;
      background: linear-gradient(135deg, var(--stamina) 0%, var(--spirit) 55%, var(--damage) 100%);
      color: #fff;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: opacity 0.15s, transform 0.15s;
    }
    .btn-save:active { opacity: 0.82; transform: scale(0.97); }

    @keyframes pulse-save {
      0%   { box-shadow: 0 0 0 0 rgba(139,124,246,.55); }
      70%  { box-shadow: 0 0 0 12px rgba(139,124,246,0); }
      100% { box-shadow: 0 0 0 0  rgba(139,124,246,0); }
    }
    .btn-save.saved { animation: pulse-save 0.45s ease; }

    /* ── HISTORY ── */
    .section-divider { height: 1px; background: var(--line); margin: 0 16px 20px; }

    .history-section { flex: 1; padding: 0 16px 32px; }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .history-title {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sub);
    }

    .export-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .date-input {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.72rem;
      padding: 8px 9px;
      outline: none;
      width: 128px;
      transition: border-color 0.15s;
      color-scheme: dark;
    }
    .date-input:focus { border-color: var(--spirit); }

    .btn-export {
      padding: 8px 15px;
      border-radius: 8px;
      border: 1.5px solid var(--spirit);
      background: transparent;
      color: var(--spirit);
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .btn-export:active { background: var(--spirit); color: var(--bg); }

    /* ── TABLE ── */
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      min-width: 290px;
      border-collapse: collapse;
      font-size: 0.78rem;
    }

    thead th {
      background: var(--surface);
      padding: 10px 13px;
      text-align: left;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sub);
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }
    thead th.col-stamina { color: var(--stamina); }
    thead th.col-spirit  { color: var(--spirit); }
    thead th.col-damage  { color: var(--damage); }

    tbody tr { border-bottom: 1px solid var(--line); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,.018); }

    tbody td {
      padding: 10px 13px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .empty-msg {
      padding: 36px 16px;
      text-align: center;
      color: var(--sub);
      font-size: 0.78rem;
      line-height: 1.7;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: calc(22px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 10px 22px;
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.22s;
      z-index: 99;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="logo">TRACKER</div>
  <div class="header-time" id="headerTime"></div>
</header>

<div class="tracker">

  <div class="stat-card stamina">
    <div class="stat-label">Stamina</div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-stamina" style="height:0%"></div>
    </div>
    <div class="stat-value" id="val-stamina">0</div>
    <div class="stat-controls">
      <button class="btn-adj" onclick="adjust('stamina',-1)">−</button>
      <button class="btn-adj" onclick="adjust('stamina',+1)">+</button>
    </div>
  </div>

  <div class="stat-card spirit">
    <div class="stat-label">Spirit</div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-spirit" style="height:0%"></div>
    </div>
    <div class="stat-value" id="val-spirit">0</div>
    <div class="stat-controls">
      <button class="btn-adj" onclick="adjust('spirit',-1)">−</button>
      <button class="btn-adj" onclick="adjust('spirit',+1)">+</button>
    </div>
  </div>

  <div class="stat-card damage">
    <div class="stat-label">Damage</div>
    <div class="bar-track">
      <div class="bar-fill" id="bar-damage" style="height:0%"></div>
    </div>
    <div class="stat-value" id="val-damage">0</div>
    <div class="stat-controls">
      <button class="btn-adj" onclick="adjust('damage',-1)">−</button>
      <button class="btn-adj" onclick="adjust('damage',+1)">+</button>
    </div>
  </div>

</div>

<div class="save-row">
  <button class="btn-save" id="saveBtn" onclick="saveState()">Save State</button>
</div>

<div class="section-divider"></div>

<div class="history-section">
  <div class="history-header">
    <span class="history-title">History</span>
    <div class="export-controls">
      <input type="date" class="date-input" id="exportFrom" />
      <input type="date" class="date-input" id="exportTo" />
      <button class="btn-export" onclick="exportCSV()">CSV</button>
    </div>
  </div>

  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Time</th>
          <th class="col-stamina">STM</th>
          <th class="col-spirit">SPR</th>
          <th class="col-damage">DMG</th>
        </tr>
      </thead>
      <tbody id="historyBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MAX = 20;
  const state = { stamina: 0, spirit: 0, damage: 0 };
  const $ = id => document.getElementById(id);
  const pad = n => String(n).padStart(2,'0');

  /* Clock */
  function tickClock() {
    const now = new Date();
    const D = ['SUN','MON','TUE','WED','THU','FRI','SAT'][now.getDay()];
    const M = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][now.getMonth()];
    $('headerTime').innerHTML =
      `${D} ${pad(now.getDate())} ${M} ${now.getFullYear()}<br>${pad(now.getHours())}:${pad(now.getMinutes())}`;
  }
  tickClock(); setInterval(tickClock, 10_000);

  /* Adjust stat */
  function adjust(key, delta) {
    state[key] = Math.max(0, Math.min(MAX, state[key] + delta));
    render();
  }

  function render() {
    ['stamina','spirit','damage'].forEach(k => {
      $('bar-' + k).style.height = (state[k] / MAX * 100) + '%';
      $('val-' + k).textContent  = state[k];
    });
  }

  /* Storage */
  function loadHistory() {
    try { return JSON.parse(localStorage.getItem('tracker_history') || '[]'); }
    catch { return []; }
  }
  function persist(h) { localStorage.setItem('tracker_history', JSON.stringify(h)); }

  /* Save snapshot */
  function saveState() {
    const now = new Date();
    const rec = {
      date:    `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
      time:    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
      stamina: state.stamina, spirit: state.spirit, damage: state.damage
    };
    const h = loadHistory();
    h.unshift(rec);
    persist(h);
    renderTable(h);

    const btn = $('saveBtn');
    btn.classList.remove('saved');
    void btn.offsetWidth;
    btn.classList.add('saved');
    setTimeout(() => btn.classList.remove('saved'), 500);
    toast('Saved ✓');
  }

  /* Render history table */
  function renderTable(h) {
    const tbody = $('historyBody');
    if (!h.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">No saves yet.<br>Adjust values and press Save State.</td></tr>';
      return;
    }
    tbody.innerHTML = h.map(r =>
      `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.stamina}</td><td>${r.spirit}</td><td>${r.damage}</td></tr>`
    ).join('');
  }

  /* CSV export */
  function exportCSV() {
    let h = loadHistory();
    const fr = $('exportFrom').value;
    const to = $('exportTo').value;
    if (fr) h = h.filter(r => r.date >= fr);
    if (to) h = h.filter(r => r.date <= to);
    if (!h.length) { toast('No records in range.'); return; }

    const csv = ['Date,Time,Stamina,Spirit,Damage',
      ...h.map(r => `${r.date},${r.time},${r.stamina},${r.spirit},${r.damage}`)
    ].join('\n');

    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([csv], { type:'text/csv' })),
      download: `tracker_${fr||'start'}_to_${to||'end'}.csv`
    });
    a.click();
    toast('CSV exported ✓');
  }

  /* Toast */
  function toast(msg) {
    const el = $('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2400);
  }

  /* Boot */
  (function init() {
    const today = new Date();
    const ago = new Date(today); ago.setDate(today.getDate() - 30);
    const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    $('exportFrom').value = fmt(ago);
    $('exportTo').value   = fmt(today);
    render();
    renderTable(loadHistory());
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  })();
</script>
</body>
</html>
